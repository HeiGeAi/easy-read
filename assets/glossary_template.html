<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>释义手册 · 人话翻译器</title>

    <!--
      HeiGe-UI · 优雅/高定编辑风（纸墨米白 × 绛红衬线）
      System fonts only — no external CDN, works offline and in China, prints clean.
    -->

    <style>
        :root {
            /* Paper-ink palette + 绛红 signature accent */
            --paper: #f4efe6;
            --paper-deep: #ece4d6;
            --paper-card: #faf6ef;
            --ink: #1c1a17;
            --ink-soft: #3d3a33;
            --grey: #6b6456;
            --accent: #b3122e;
            --accent-deep: #8f0f24;
            --line: rgba(28, 26, 23, 0.16);
            --line-strong: rgba(28, 26, 23, 0.5);

            /* Level index colors — used only as a slim wayfinding underline */
            --lv-beginner: #2f7d5b;
            --lv-intermediate: #2b5f9e;
            --lv-professional: #b06a12;
            --lv-advanced: #a5313a;
            --lv-expert: #6d4aa0;

            /* Type — system stacks, CJK serif carries the editorial character */
            --serif: Georgia, "Times New Roman", "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
            --cn-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", Georgia, serif;
            --sans: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
            --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Cascadia Code", Consolas, monospace;

            --gutter: clamp(20px, 5.5vw, 88px);
            --maxw: 1080px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 17px;
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            overflow-x: hidden;
        }
        ::selection { background: var(--accent); color: var(--paper); }

        /* ---------- shared editorial atoms ---------- */
        .kicker {
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 11.5px;
            color: var(--grey);
        }
        .rule { height: 1px; background: var(--line-strong); border: none; }
        .rule--thin { background: var(--line); }
        .wrap { max-width: var(--maxw); margin: 0 auto; }

        /* Skip link — visible only on keyboard focus */
        .skip-link {
            position: absolute; left: -9999px; top: 0; z-index: 100;
            padding: 12px 18px; background: var(--accent); color: var(--paper);
            font-family: var(--mono); font-size: 12px; letter-spacing: .12em;
            text-decoration: none; border-radius: 0 0 8px 0;
        }
        .skip-link:focus { left: 0; }
        a:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

        /* ---------- reveal on scroll ---------- */
        .reveal {
            opacity: 0; transform: translateY(24px);
            transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1);
        }
        .reveal.in { opacity: 1; transform: none; }

        /* ============ MASTHEAD ============ */
        .masthead {
            display: flex; justify-content: space-between; align-items: baseline;
            gap: 14px 24px; flex-wrap: wrap;
            padding: 22px var(--gutter) 20px;
            border-bottom: 1px solid var(--line);
        }
        .masthead__mark {
            font-family: var(--mono); font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.28em; font-size: 13px; color: var(--ink);
        }
        .masthead__mark b { color: var(--accent); }

        /* ============ HERO — the article summary as editor's note ============ */
        .hero {
            position: relative;
            padding: clamp(44px, 8vh, 96px) var(--gutter) clamp(40px, 6vh, 72px);
        }
        /* oxblood bleed sliver — signature spine */
        .hero::before {
            content: ""; position: absolute; left: 0; top: clamp(44px, 8vh, 96px);
            width: 10px; height: clamp(120px, 30vh, 260px);
            background: var(--accent);
        }
        .hero__kicker { margin-bottom: clamp(22px, 4vh, 40px); }
        .hero__title {
            font-family: var(--serif);
            font-weight: 700;
            line-height: 0.98;
            letter-spacing: -0.01em;
            font-size: clamp(52px, 10vw, 128px);
            color: var(--ink);
        }
        .hero__title .cn {
            display: block;
            font-family: var(--cn-serif);
            font-size: 0.42em;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-top: 0.28em;
            color: var(--accent);
        }
        .summary {
            margin-top: clamp(34px, 6vh, 64px);
            max-width: 34em;
        }
        .summary__label { margin-bottom: 20px; }
        .summary__body {
            font-family: var(--cn-serif);
            font-weight: 500;
            font-size: clamp(19px, 2.3vw, 27px);
            line-height: 1.62;
            color: var(--ink);
        }
        /* drop cap 首字下沉 */
        .summary__body::first-letter {
            font-family: var(--serif);
            font-weight: 700;
            float: left;
            font-size: 3em;
            line-height: 0.72;
            padding: 0.06em 0.14em 0 0;
            color: var(--accent);
        }

        /* ============ DOMAIN INDEX STRIP ============ */
        .domains {
            padding: clamp(30px, 5vh, 52px) var(--gutter);
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            background: var(--paper-deep);
        }
        .domains__label { margin-bottom: 22px; }
        .domain-list {
            list-style: none;
            display: flex; flex-wrap: wrap;
            gap: 12px 14px;
        }
        .domain {
            display: inline-flex; align-items: baseline; gap: 9px;
            padding: 9px 15px;
            background: var(--paper-card);
            border: 1px solid var(--line);
            max-width: 100%; min-width: 0;
        }
        .domain__emoji { font-size: 1.05em; flex: none; }
        .domain__name {
            font-family: var(--cn-serif); font-weight: 700; font-size: 15px; color: var(--ink);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .domain__count {
            font-family: var(--mono); font-size: 12px; font-weight: 700;
            color: var(--accent); flex: none;
        }

        /* ============ GLOSSARY BODY ============ */
        .glossary { padding: clamp(20px, 4vh, 40px) var(--gutter) 0; }

        /* chapter = one difficulty level */
        .chapter { padding: clamp(46px, 8vh, 88px) 0 clamp(12px, 2vh, 24px); }
        .chapter:first-child { padding-top: clamp(40px, 6vh, 64px); }
        .chapter__head {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: baseline;
            gap: 18px 22px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--ink);
        }
        .chapter__no {
            font-family: var(--serif); font-weight: 700; font-style: italic;
            font-size: clamp(34px, 5vw, 60px); line-height: 0.8;
            color: var(--accent);
        }
        .chapter__title {
            font-family: var(--cn-serif); font-weight: 700;
            font-size: clamp(23px, 3vw, 38px); letter-spacing: 0.01em;
            color: var(--ink);
            /* slim level-colored underline as difficulty wayfinding */
            border-bottom: 3px solid var(--level, var(--accent));
            padding-bottom: 4px;
            justify-self: start;
        }
        .chapter__meta {
            font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.14em;
            font-size: 11px; color: var(--grey); text-align: right;
        }
        .level-beginner    { --level: var(--lv-beginner); }
        .level-intermediate{ --level: var(--lv-intermediate); }
        .level-professional{ --level: var(--lv-professional); }
        .level-advanced    { --level: var(--lv-advanced); }
        .level-expert      { --level: var(--lv-expert); }

        /* entry = one term, styled like a dictionary entry */
        .entry {
            padding: clamp(26px, 4vh, 40px) 0;
            border-bottom: 1px solid var(--line);
        }
        .entry__head {
            display: flex; flex-wrap: wrap; align-items: baseline;
            gap: 8px 18px; margin-bottom: 16px;
        }
        .entry__name {
            font-family: var(--serif);
            font-weight: 700;
            font-size: clamp(26px, 3.6vw, 44px);
            line-height: 1.04;
            letter-spacing: -0.01em;
            color: var(--ink);
        }
        .entry__name .en { font-family: var(--serif); }
        .entry__name.is-cn { font-family: var(--cn-serif); }
        .entry__phon {
            display: inline-flex; flex-wrap: wrap; align-items: baseline; gap: 6px 12px;
            padding-bottom: 4px;
        }
        .ipa {
            font-family: var(--mono); font-size: 14px;
            color: var(--accent-deep);
        }
        .cn-phon {
            font-family: var(--cn-serif); font-size: 14px; color: var(--grey);
        }
        .cn-phon::before { content: "≈ "; color: var(--line-strong); }

        .entry__explain {
            font-family: var(--cn-serif);
            font-size: clamp(16.5px, 1.5vw, 19px);
            line-height: 1.78;
            color: var(--ink);
            max-width: 44em;
        }

        .entry__note {
            margin-top: 16px;
            padding-left: 18px;
            border-left: 2px solid var(--line);
            max-width: 44em;
        }
        .entry__note--history { border-left-color: var(--accent); }
        .note__label {
            display: block;
            font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.12em;
            font-size: 10.5px; color: var(--grey); margin-bottom: 4px;
        }
        .note__body {
            font-family: var(--cn-serif); font-size: 15.5px; line-height: 1.72; color: var(--ink-soft);
        }
        .entry__time {
            margin-top: 14px;
            font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; color: var(--grey);
        }
        .entry__more {
            margin-top: 18px;
            font-family: var(--cn-serif); font-size: 14.5px; color: var(--accent-deep);
        }

        /* ============ FOOTER ============ */
        footer {
            margin-top: clamp(40px, 7vh, 80px);
            padding: clamp(48px, 8vh, 90px) var(--gutter) clamp(36px, 5vh, 56px);
            border-top: 2px solid var(--ink);
            background: var(--paper-deep);
        }
        .foot__big {
            font-family: var(--cn-serif); font-weight: 700;
            font-size: clamp(30px, 6vw, 64px); line-height: 1.05; letter-spacing: 0.01em;
            color: var(--ink); max-width: 18em;
        }
        .foot__big b { color: var(--accent); }
        .foot__meta {
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px 24px;
            margin-top: clamp(28px, 5vh, 48px);
        }
        .foot__meta span { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey); }

        /* ============ RESPONSIVE — re-composed for mobile ============ */
        @media (max-width: 720px) {
            body { font-size: 16px; }
            .masthead { flex-direction: column; gap: 4px; align-items: flex-start; }
            .hero::before { width: 6px; }
            .chapter__head {
                grid-template-columns: auto 1fr;
                grid-template-areas: "no title" "meta meta";
            }
            .chapter__no { grid-area: no; }
            .chapter__title { grid-area: title; }
            .chapter__meta { grid-area: meta; text-align: left; margin-top: 6px; }
            .entry__head { gap: 6px 12px; }
        }

        /* ============ PRINT — paper-ink is already print-native ============ */
        @media print {
            :root { --paper: #ffffff; --paper-deep: #ffffff; --paper-card: #ffffff; }
            body { background: #fff; color: #000; font-size: 12pt; }
            .skip-link, .masthead__mark + .kicker { }
            .reveal { opacity: 1 !important; transform: none !important; }
            .hero::before { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .chapter, .entry { page-break-inside: avoid; }
            .chapter__head { page-break-after: avoid; }
            .domains { background: #fff !important; border-color: #bbb !important; }
            .domain { background: #fff !important; border-color: #bbb !important; }
            footer { background: #fff !important; }
            a { color: inherit; text-decoration: none; }
            .ipa, .chapter__no, .entry__note--history, .hero__title .cn, .foot__big b {
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
        }
        @page { margin: 16mm 14mm; }

        /* ============ REDUCED MOTION ============ */
        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .reveal { opacity: 1 !important; transform: none !important; transition: none; }
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <a href="#glossary-content" class="skip-link">跳到词汇表内容</a>

    <div class="masthead">
        <span class="masthead__mark">人话翻译器 <b>/</b> EASY READ</span>
        <span class="kicker">把看不懂的，变成谁都能懂的</span>
    </div>

    <header class="hero">
        <p class="hero__kicker kicker">释义手册 · Glossary</p>
        <h1 class="hero__title reveal">
            Easy&nbsp;Read
            <span class="cn">这篇，说人话</span>
        </h1>

        <div class="summary reveal">
            <p class="summary__label kicker">文章摘要 · In Plain Words</p>
            <p class="summary__body">{{SUMMARY}}</p>
        </div>
    </header>

    <!-- Domain index strip (omitted by the generator when no domains) -->
    {{DOMAIN_OVERVIEW}}

    <main class="glossary wrap" id="glossary-content">
        {{GLOSSARY_SECTIONS}}
    </main>

    <footer>
        <p class="foot__big">看不懂的词，本不该把人挡在门外。<b>想深挖任何一个词，继续问我就行。</b></p>
        <div class="foot__meta">
            <span>人话翻译器 · 信息平权</span>
            <span>本页可直接打印为 PDF 保存</span>
        </div>
    </footer>

    <script>
    (function () {
        var nodes = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
        function revealAll() { nodes.forEach(function (n) { n.classList.add('in'); }); }
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduce || !('IntersectionObserver' in window)) {
            revealAll();
        } else {
            var io = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });
            nodes.forEach(function (n) { io.observe(n); });
            // safety fallback: never let content stay hidden
            setTimeout(revealAll, 1600);
        }
    })();
    </script>
</body>
</html>
